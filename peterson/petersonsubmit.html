<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crane Submit</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amethysta&family=Be+Vietnam+Pro:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="petersonsstylesheet.css">
</head>

<header>
    <nav id="navgrid">
        <img id="logo" src="peterson-site-resources/cranelogo.png" alt="Crane Logo">
        <a class="navbutton" href="#">Home</a>
        <a class="navbutton" href="#">Explore</a>
        <a class="navbutton" href="#">Submit</a>
        <a class="navbutton" href="#">Search</a>
    </nav>
</header>

<main>
    <div class="container">
        <h2>Sumbission</h2>

        <div class="upload-section">
            <div class="upload-box">Upload cover img</div>
            <div class="upload-box">Upload instructions img</div>
        </div>

        <label>Model Name</label>
        <input type="text" placeholder="Enter model name">

        <label>Summary of Model</label>
        <textarea placeholder="Enter summary"></textarea>

        <label>Difficulty (out of 5)</label>
        <div class="stars">
            <input type="radio" name="rating" value="1">1
            <input type="radio" name="rating" value="2">2
            <input type="radio" name="rating" value="3">3
            <input type="radio" name="rating" value="4">4
            <input type="radio" name="rating" value="5">5
        </div>

        <label>First and Last Name</label>
        <input type="text" placeholder="Your name">

        <button>Submit</button>
    </div>



</main>





<footer>
            <h3>Crane &copy;</h3>
                <div id="socialgrid">
                    <img class="socialbutton" src="peterson-site-resources/twitter.png" alt="X">
                    <img class="socialbutton" src="peterson-site-resources/facebook.png" alt="Facebook">
                    <img class="socialbutton" src="peterson-site-resources/insta.png" alt="Instagram">
                </div>
        </footer>
